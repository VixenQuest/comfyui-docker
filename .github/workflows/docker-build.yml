name: Build and Push ComfyUI Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'start.sh'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [worker.oci]
              max-parallelism = 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: aptauyan/comfyui-main:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
            CACHEBUST=${{ github.run_id }}
          cache-from: type=registry,ref=aptauyan/comfyui-main:buildcache
          cache-to: type=registry,ref=aptauyan/comfyui-main:buildcache,mode=max
