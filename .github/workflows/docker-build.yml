name: Build and Push ComfyUI Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'start.sh'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/vixenquest/comfyui-main:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
            CACHEBUST=${{ github.run_id }}
          cache-from: type=registry,ref=ghcr.io/vixenquest/comfyui-main:buildcache
          cache-to: type=registry,ref=ghcr.io/vixenquest/comfyui-main:buildcache,mode=max
